<button id="chatToggle" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 15px;
  background: #222;
  color: white;
  border: none;
  cursor: pointer;
">
  Chat <span id="chatBadge" style="
    background:red;
    color:white;
    padding:2px 6px;
    border-radius:50%;
    font-size:12px;
    display:none;
  ">0</span>
</button>

<div id="chatContainer" style="
  display:none;
  position:fixed;
  bottom:70px;
  right:20px;
  width:400px;
  height:500px;
  background:white;
  border:1px solid #ccc;
">
  <iframe src="/chat" width="100%" height="100%" style="border:none;"></iframe>
</div>

<script>
const btn = document.getElementById("chatToggle");
const chat = document.getElementById("chatContainer");

btn.addEventListener("click", () => {
  if (chat.style.display === "none") {
    chat.style.display = "block";
  } else {
    chat.style.display = "none";
  }
});

// ===== AJAX new message check =====

function checkNewMessages() {
  fetch('/api/getchat')
    .then(res => res.text())
    .then(count => {

      const badge = document.getElementById("chatBadge");

      if (parseInt(count) > 0) {
        badge.innerText = count;
        badge.style.display = "inline";
      } else {
        badge.style.display = "none";
      }

    });
}

checkNewMessages();
setInterval(checkNewMessages, 3000);

</script>
